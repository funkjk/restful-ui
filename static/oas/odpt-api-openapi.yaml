          in: path
          required: true
          description: |
            取得するデータのURI。
            ucode形式（urn:ucode:_...）またはowl:sameAs形式（例: odpt.Station:JR-East.Yamanote.Tokyo）を指定
          schema:
            type: string
            example: "odpt.Station:JR-East.Yamanote.Tokyo"
        - name: acl:consumerKey
          in: query
          required: true
          description: developerサイトにて発行されたアクセストークン
          schema:
            type: string
