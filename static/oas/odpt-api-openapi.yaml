                  summary: 駅情報の例
                  value:
                    "@context": "http://vocab.odpt.org/context_odpt.jsonld"
                    "@id": "urn:ucode:_00001C000000000000010000031028E6"
                    "@type": "odpt:Station"
                    "dc:date": "2017-01-13T15:10:00+09:00"
                    "owl:sameAs": "odpt.Station:JR-East.Yamanote.Tokyo"
                    "dc:title": "東京"
                    "odpt:stationTitle":
                      ja: "東京"
                      en: "Tokyo"
                    "odpt:operator": "odpt.Operator:JR-East"
                    "odpt:railway": "odpt.Railway:JR-East.Yamanote"
                    "geo:long": 139.766926
                    "geo:lat": 35.681265
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "402":
          description: 課金が必要
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "405":
          $ref: '#/components/responses/MethodNotAllowed'
        "500":
          $ref: '#/components/responses/InternalServerError'
        "503":
          $ref: '#/components/responses/ServiceUnavailable'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: query
      name: acl:consumerKey
      description: |
        developerサイトにて発行されたアクセストークン
        すべてのリクエストで必須

  responses:
    BadRequest:
      description: パラメータ不正
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: acl:consumerKeyが誤っている
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: 権限なし
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: 該当データ無し
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    MethodNotAllowed:
      description: 許可されていないHTTP Method
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalServerError:
      description: サーバー内部エラー
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ServiceUnavailable:
      description: サービス利用不可
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    # 共通プロパティ（すべてのODPTデータ型に共通）
    JsonLdContext:
      type: object
      properties:
        "@context":
          type: string
          format: uri
          description: JSON-LD仕様に基づく @context のURL
          example: "http://vocab.odpt.org/context_odpt.jsonld"
        "@id":
          type: string
          format: uri
          description: 固有識別子(ucode)
          example: "urn:ucode:_00001C000000000000010000030FD7E5"
        "@type":
          type: string
          description: クラス指定
          example: "odpt:Station"
        "owl:sameAs":
          type: string
          format: uri
          description: 固有識別子の別名
          example: "odpt.Station:JR-East.Yamanote.Tokyo"
        "dc:date":
          type: string
          format: date-time
          description: データ生成日時（ISO8601 日付時刻形式）
          example: "2017-01-13T15:10:00+09:00"

    # 多言語対応オブジェクト
    MultilingualTitle:
      type: object
      properties:
        ja:
          type: string
          description: 日本語のタイトル
        en:
          type: string
          description: 英語のタイトル
      additionalProperties:
        type: string

    # 共通クラス
    Calendar:
      allOf:
        - $ref: '#/components/schemas/JsonLdContext'
      type: object
      properties:
        "@type":
          type: string
          enum: ["odpt:Calendar"]
          example: "odpt:Calendar"
        "owl:sameAs":
          type: string
          format: uri
          description: 固有識別子。命名ルールは、odpt.Calendar:名称(.期間)
          example: "odpt.Calendar:Weekday"
          x-restfului-link: 
            - "/odpt:StationTimetable?odpt:calendar={owl:sameAs}"
        "dc:title":
          type: string
          description: カレンダー名称（日本語）。e.g. 平日、休日、市場休日
          example: "平日"
        "odpt:calendarTitle":
          $ref: '#/components/schemas/MultilingualTitle'
        "odpt:day":
          type: array
          items:
            type: string
            format: date
          description: 該当する日付のリスト。値は全てISO8601の日付形式。
          example: ["2017-01-13", "2017-01-18"]
        "odpt:duration":
          type: string
          description: カレンダー有効期間。値は全てISO8601の期間形式。
          example: "2017-11-13/2017-11-18"
      additionalProperties: true

    Operator:
      allOf:
        - $ref: '#/components/schemas/JsonLdContext'
      type: object
      properties:
        "@type":
          type: string
          enum: ["odpt:Operator"]
          example: "odpt:Operator"
        "owl:sameAs":
          type: string
          format: uri
          description: 固有識別子。命名ルールは、odpt.Operator:名称
          example: "odpt.Operator:JR-East"
          x-restfului-link: 
            - "/odpt:Railway?odpt:operator={owl:sameAs}"
            - "/odpt:Station?odpt:operator={owl:sameAs}"
            - "/odpt:TrainType?odpt:operator={owl:sameAs}"
            - "/odpt:StationTimetable?odpt:operator={owl:sameAs}"
            - "/odpt:TrainInformation?odpt:operator={owl:sameAs}"
            - "/odpt:FlightInformationArrival?odpt:airline={owl:sameAs}"
            - "/odpt:FlightInformationDeparture?odpt:airline={owl:sameAs}"
        "dc:title":
          type: string
          description: 事業者名称（日本語）
          example: "JR東日本"
        "odpt:operatorTitle":
          $ref: '#/components/schemas/MultilingualTitle'
      additionalProperties: true

    # 鉄道関連データ型
    Station:
      allOf:
        - $ref: '#/components/schemas/JsonLdContext'
      type: object
      properties:
        "@type":
          type: string
          enum: ["odpt:Station"]
          example: "odpt:Station"
        "owl:sameAs":
          type: string
          format: uri
          description: 固有識別子。命名ルールは、odpt.Station:会社名.路線名.駅名
          example: "odpt.Station:JR-East.Yamanote.Tokyo"
          x-restfului-link: 
            - "/odpt:Railway?odpt:railway={owl:sameAs}"
            - "/odpt:StationTimetable?odpt:station={owl:sameAs}"
            - "/odpt:Railway?odpt:stationOrder={owl:sameAs}"
            - "/odpt:Station?odpt:connectingStation={owl:sameAs}"
            - "/odpt:RailwayFare?odpt:fromStation={owl:sameAs}"
            - "/odpt:RailwayFare?odpt:toStation={owl:sameAs}"
        "dc:title":
          type: string
          description: 駅名（日本語）
          example: "東京"
        "odpt:stationTitle":
          $ref: '#/components/schemas/MultilingualTitle'
        "odpt:operator":
          type: string
          format: uri
          description: 運行会社を表すID (odpt:Operatorのowl:sameAs)
          example: "odpt.Operator:JR-East"
          x-restfului-link: 
            - "/odpt:Operator?owl:sameAs={odpt:operator}"
        "odpt:railway":
          type: string
          format: uri
          description: 路線を表すID (odpt:Railwayのowl:sameAs)
          example: "odpt.Railway:JR-East.Yamanote"
          x-restfului-link: 
            - "/odpt:Railway?owl:sameAs={odpt:railway}"
        "odpt:stationCode":
          type: string
          description: 駅コード
          example: "JY01"
        "geo:long":
          type: number
          description: 代表点の経度 (10進表記、測地系はWGS84)
          example: 139.766926
        "geo:lat":
          type: number
          description: 代表点の緯度 (10進表記、測地系はWGS84)
          example: 35.681265
        "odpt:stationTimetable":
          type: array
          items:
            type: string
            format: uri
            x-restfului-link: 
              - "/odpt:StationTimetable?owl:sameAs={$value}"
          description: 駅時刻表のID (odpt:StationTimetableのowl:sameAs) のリスト
        "odpt:connectingRailway":
          type: array
          items:
            type: string
            format: uri
            x-restfului-link: 
              - "/odpt:Railway?owl:sameAs={$value}"
          description: 乗り換え可能路線のID (odpt:Railwayのowl:sameAs) のリスト
        "odpt:connectingStation":
          type: array
          items:
            type: string
            format: uri
            x-restfului-link: 
              - "/odpt:Station?owl:sameAs={$value}"
          description: 乗り換え可能駅のID (odpt:Stationのowl:sameAs) のリスト
      additionalProperties: true

    Railway:
      allOf:
        - $ref: '#/components/schemas/JsonLdContext'
      type: object
      properties:
        "@type":
          type: string
          enum: ["odpt:Railway"]
          example: "odpt:Railway"
        "owl:sameAs":
          type: string
          format: uri
          description: 固有識別子。命名ルールは、odpt.Railway:会社名.路線名
          example: "odpt.Railway:JR-East.Yamanote"
          x-restfului-link: 
            - "/odpt:Station?odpt:railway={owl:sameAs}"
            - "/odpt:StationTimetable?odpt:railway={owl:sameAs}"
            - "/odpt:TrainInformation?odpt:railway={owl:sameAs}"
            - "/odpt:Station?odpt:connectingRailway={owl:sameAs}"
        "dc:title":
          type: string
          description: 路線名（日本語）
          example: "山手線"
        "odpt:railwayTitle":
          $ref: '#/components/schemas/MultilingualTitle'
        "odpt:operator":
          type: string
          format: uri
          description: 運行会社を表すID (odpt:Operatorのowl:sameAs)
          example: "odpt.Operator:JR-East"
          x-restfului-link: 
            - "/odpt:Operator?owl:sameAs={odpt:operator}"
        "odpt:lineCode":
          type: string
          description: 路線コード、路線シンボル表記を格納。e.g. 丸ノ内線=>M
          example: "M"
        "odpt:ascendingRailDirection":
          type: string
          format: uri
          description: 昇順の進行方向を表すID
          example: "odpt.RailDirection:Outbound"
          x-restfului-link: 
            - "/odpt:RailDirection?owl:sameAs={odpt:ascendingRailDirection}"
        "odpt:descendingRailDirection":
          type: string
          format: uri
          description: 降順の進行方向を表すID
          example: "odpt.RailDirection:Inbound"
          x-restfului-link: 
            - "/odpt:RailDirection?owl:sameAs={odpt:descendingRailDirection}"
        "odpt:stationOrder":
          type: array
          items:
            $ref: '#/components/schemas/StationOrder'
          description: 駅の順序を表すリスト
      additionalProperties: true

    StationOrder:
      type: object
      properties:
        "odpt:station":
          type: string
          format: uri
          description: 駅を表すID (odpt:Stationのowl:sameAs)
          example: "odpt.Station:JR-East.ChuoRapid.Tokyo"
          x-restfului-link: 
            - "/odpt:Station?owl:sameAs={odpt:station}"
        "odpt:stationTitle":
          $ref: '#/components/schemas/MultilingualTitle'
        "odpt:index":
          type: integer
          description: 駅の順序を示す整数値
          example: 1
      additionalProperties: true

    RailDirection:
      allOf:
        - $ref: '#/components/schemas/JsonLdContext'
      type: object
      properties:
        "@type":
          type: string
          enum: ["odpt:RailDirection"]
          example: "odpt:RailDirection"
        "owl:sameAs":
          type: string
          format: uri
          description: 固有識別子。命名ルールは、odpt.RailDirection:進行方向 または odpt.RailDirection:会社名.進行方向
          example: "odpt.RailDirection:Inbound"
          x-restfului-link: 
            - "/odpt:StationTimetable?odpt:railDirection={owl:sameAs}"
            - "/odpt:TrainInformation?odpt:railDirection={owl:sameAs}"
            - "/odpt:Railway?odpt:ascendingRailDirection={owl:sameAs}"
            - "/odpt:Railway?odpt:descendingRailDirection={owl:sameAs}"
        "dc:title":
          type: string
          description: 進行方向（日本語）
          example: "上り"
        "odpt:railDirectionTitle":
          $ref: '#/components/schemas/MultilingualTitle'
      additionalProperties: true

    TrainType:
      allOf:
        - $ref: '#/components/schemas/JsonLdContext'
      type: object
      properties:
        "@type":
          type: string
          enum: ["odpt:TrainType"]
          example: "odpt:TrainType"
        "owl:sameAs":
          type: string
          format: uri
          description: 固有識別子。命名ルールは、odpt.TrainType:会社名.列車種別
          example: "odpt.TrainType:JR-East.Local"
          x-restfului-link: 
            - "/odpt:Operator?odpt:operator={owl:sameAs}"
            - "/odpt:StationTimetable?odpt:trainType={owl:sameAs}"
        "odpt:operator":
          type: string
          format: uri
          description: 運行会社を表すID (odpt:Operatorのowl:sameAs)
          example: "odpt.Operator:JR-East"
          x-restfului-link: 
            - "/odpt:Operator?owl:sameAs={odpt:operator}"
        "dc:title":
          type: string
          description: 列車種別（日本語）
          example: "普通"
        "odpt:trainTypeTitle":
          $ref: '#/components/schemas/MultilingualTitle'
      additionalProperties: true

    StationTimetableObject:
      type: object
      properties:
        "odpt:arrivalTime":
          type: string
          description: 到着時刻 (ISO8601時刻形式)
          example: "05:08"
        "odpt:departureTime":
          type: string
          description: 出発時刻 (ISO8601時刻形式)
          example: "06:00"
        "odpt:originStation":
          type: array
          items:
            type: string
            format: uri
          x-restfului-link: 
            - "/odpt:Station?owl:sameAs={$value}"
          description: 始発駅を表すID (odpt:Stationのowl:sameAs) のリスト
        "odpt:destinationStation":
          type: array
          items:
            type: string
            format: uri
          x-restfului-link: 
            - "/odpt:Station?owl:sameAs={$value}"
          description: 終着駅(行先駅)を表すID (odpt:Stationのowl:sameAs) のリスト
        "odpt:viaStation":
          type: array
          items:
            type: string
            format: uri
          x-restfului-link: 
            - "/odpt:Station?owl:sameAs={$value}"
          description: 経由駅を表すID (odpt:Stationのowl:sameAs) のリスト
        "odpt:viaRailway":
          type: array
          items:
            type: string
            format: uri
          x-restfului-link: 
            - "/odpt:Railway?owl:sameAs={$value}"
          description: 経由路線を表すID (odpt:Railwayのowl:sameAs) のリスト
        "odpt:train":
          type: string
          format: uri
          description: 到着または出発する列車ID (odpt:Trainのowl:sameAs)
          x-restfului-link: 
            - "/odpt:Train?owl:sameAs={odpt:train}"
        "odpt:trainNumber":
          type: string
          description: 列車番号
          example: "123M"
        "odpt:trainType":
          type: string
          format: uri
          description: 列車種別のID (odpt:TrainTypeのowl:sameAs)
          example: "odpt.TrainType:JR-East.Local"
          x-restfului-link: 
            - "/odpt:TrainType?owl:sameAs={odpt:trainType}"
        "odpt:isLast":
          type: boolean
          description: 最終電車の場合、true
        "odpt:isOrigin":
          type: boolean
          description: 始発駅の場合、true
        "odpt:platformNumber":
          type: string
          description: 列車が到着するプラットフォームの番号
          example: "1"
        "odpt:carComposition":
          type: integer
          description: 車両数（駅に停車する車両数が列車毎に異なる場合に格納する）
          example: 8
      additionalProperties: true

    StationTimetable:
      allOf:
        - $ref: '#/components/schemas/JsonLdContext'
      type: object
      properties:
        "@type":
          type: string
          enum: ["odpt:StationTimetable"]
          example: "odpt:StationTimetable"
        "owl:sameAs":
          type: string
          format: uri
          description: 固有識別子。命名ルールは、odpt.StationTimetable:会社名.路線名.駅名.方面名.曜日種別
          example: "odpt.StationTimetable:JR-East.ChuoRapid.Tokyo.Outbound.Weekday"
          x-restfului-link: 
            - "/odpt:Station?odpt:station={owl:sameAs}"
            - "/odpt:Railway?odpt:railway={owl:sameAs}"
        "dct:issued":
          type: string
          format: date
          description: ダイヤ改正日（ISO8601 日付形式）
          example: "2017-01-01"
        "dct:valid":
          type: string
          format: date-time
          description: データの保証期限（ISO8601 日付時刻形式）
        "odpt:operator":
          type: string
          format: uri
          description: 運行会社を表すID (odpt:Operatorのowl:sameAs)
          example: "odpt.Operator:JR-East"
          x-restfului-link: 
            - "/odpt:Operator?owl:sameAs={odpt:operator}"
        "odpt:railway":
          type: string
          format: uri
          description: 路線を表すID (odpt:Railwayのowl:sameAs)
          example: "odpt.Railway:JR-East.ChuoRapid"
          x-restfului-link: 
            - "/odpt:Railway?owl:sameAs={odpt:railway}"
        "odpt:railwayTitle":
          $ref: '#/components/schemas/MultilingualTitle'
        "odpt:station":
          type: string
          format: uri
          description: 駅を表すID (odpt:Stationのowl:sameAs)
          example: "odpt.Station:JR-East.ChuoRapid.Tokyo"
          x-restfului-link: 
            - "/odpt:Station?owl:sameAs={odpt:station}"
        "odpt:stationTitle":
          $ref: '#/components/schemas/MultilingualTitle'
        "odpt:railDirection":
          type: string
          format: uri
          description: 方面を表すID (odpt:RailDirectionのowl:sameAs)
          example: "odpt.RailDirection:Outbound"
          x-restfului-link: 
            - "/odpt:RailDirection?owl:sameAs={odpt:railDirection}"
        "odpt:calendar":
          type: string
          format: uri
          description: 運行を行う曜日・日付情報のID (odpt:Calendarのowl:sameAs)
          example: "odpt.Calendar:Weekday"
          x-restfului-link: 
            - "/odpt:Calendar?owl:sameAs={odpt:calendar}"
        "odpt:stationTimetableObject":
          type: array
          items:
            $ref: '#/components/schemas/StationTimetableObject'
          description: 出発時刻、終着（行先）駅等の組のリスト
      additionalProperties: true

    TrainInformation:
      allOf:
        - $ref: '#/components/schemas/JsonLdContext'
      type: object
      properties:
        "@type":
          type: string
          enum: ["odpt:TrainInformation"]
          example: "odpt:TrainInformation"
        "owl:sameAs":
          type: string
          format: uri
          description: 固有識別子。命名ルールは、odpt.TrainInformation:会社名.路線名 または odpt.TrainInformation:会社名
          example: "odpt.TrainInformation:TokyoMetro.Ginza"
          x-restfului-link: 
            - "/odpt:Railway?odpt:railway={owl:sameAs}"
            - "/odpt:Operator?odpt:operator={owl:sameAs}"
        "dct:valid":
          type: string
          format: date-time
          description: データ保証期限（ISO8601 日付時刻形式）
        "odpt:timeOfOrigin":
          type: string
          format: date-time
          description: 発生時刻（ISO8601 日付時刻形式）
        "odpt:operator":
          type: string
          format: uri
          description: 運行会社を表すID (odpt:Operatorのowl:sameAs)
          x-restfului-link: 
            - "/odpt:Operator?owl:sameAs={odpt:operator}"
        "odpt:railway":
          type: string
          format: uri
          description: 発生路線を表すID (odpt:Railwayのowl:sameAs)
          x-restfului-link: 
            - "/odpt:Railway?owl:sameAs={odpt:railway}"
        "odpt:trainInformationStatus":
          $ref: '#/components/schemas/MultilingualTitle'
        "odpt:trainInformationText":
          $ref: '#/components/schemas/MultilingualTitle'
        "odpt:railDirection":
          type: string
          format: uri
          description: 運行情報の適用される方向を表すID (odpt:RailDirectionのowl:sameAs)
          x-restfului-link: 
            - "/odpt:RailDirection?owl:sameAs={odpt:railDirection}"
      additionalProperties: true

    # 汎用的なODPTデータ型（追加プロパティを許可）
    OdptDataObject:
      allOf:
        - $ref: '#/components/schemas/JsonLdContext'
      type: object
      additionalProperties: true

    # エラーレスポンス
    Error:
      type: object
      properties:
        error:
          type: string
          description: エラーメッセージ
      required:
        - error
