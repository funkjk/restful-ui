openapi: 3.1.0

info:
  title: 公共交通オープンデータセンター (ODPT) Challenge API
  description: |
    ODPTチャレンジAPIの仕様書（JSON-LD形式で公共交通データを提供）
    
    本APIは、鉄道、バス、航空機の情報を提供するRESTful APIです。
    すべてのデータはJSON-LD形式で返されます。
    
    詳細な仕様については、`odpt-api-specification.md` を参照してください。
  version: "4.14"
  contact:
    name: 公共交通オープンデータ協議会
    email: info@odpt.org
  license:
    name: CC BY 4.0
    url: https://creativecommons.org/licenses/by/4.0/

servers:
  - url: https://api-challenge.odpt.org/api/v4
    description: ODPTチャレンジAPIサーバー

security:
  - ApiKeyAuth: []

paths:
  "/odpt:Calendar":
    get:
      summary: カレンダー情報取得
      description: |
        曜日・日付区分(odpt:Calendar)の内容を取得します。
      operationId: getCalendar
      tags:
        - Common
      parameters:
        - name: acl:consumerKey
          in: query
          required: true
          description: developerサイトにて発行されたアクセストークン
          schema:
            type: string
        - name: "@id"
          in: query
          required: false
          description: データに付与された固有識別子（フィルタリング用）
          schema:
            type: string
            format: uri
            example: "urn:ucode:_00001C000000000000010000030FD7E5"
        - name: owl:sameAs
          in: query
          required: false
          description: データに付与された固有識別子の別名（フィルタリング用）
          schema:
            type: string
            format: uri
            example: "odpt.Calendar:Weekday"
      responses:
        "200":
          description: 正常終了
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Calendar'
              examples:
                calendar:
                  summary: カレンダー情報の例
                  value:
                    - "@context": "http://vocab.odpt.org/context_odpt.jsonld"
                      "@id": "urn:ucode:_00001C000000000000010000030FD7E5"
                      "@type": "odpt:Calendar"
                      "dc:date": "2017-01-13T15:10:00+09:00"
                      "owl:sameAs": "odpt.Calendar:Weekday"
                      "dc:title": "平日"
                      "odpt:calendarTitle":
                        ja: "平日"
                        en: "Weekday"
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "405":
          $ref: '#/components/responses/MethodNotAllowed'
        "500":
          $ref: '#/components/responses/InternalServerError'
        "503":
          $ref: '#/components/responses/ServiceUnavailable'

  "/odpt:Operator":
    get:
      summary: 事業者情報取得
      description: |
        公共交通機関の事業者(odpt:Operator)の内容を取得します。
      operationId: getOperator
      tags:
        - Common
      parameters:
        - name: acl:consumerKey
          in: query
          required: true
          description: developerサイトにて発行されたアクセストークン
          schema:
            type: string
        - name: "@id"
          in: query
          required: false
          description: データに付与された固有識別子（フィルタリング用）
          schema:
            type: string
            format: uri
        - name: owl:sameAs
          in: query
          required: false
          description: データに付与された固有識別子の別名（フィルタリング用）
          schema:
            type: string
            format: uri
            example: "odpt.Operator:JR-East"
      responses:
        "200":
          description: 正常終了
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Operator'
              examples:
                operator:
                  summary: 事業者情報の例
                  value:
                    - "@context": "http://vocab.odpt.org/context_odpt.jsonld"
                      "@id": "urn:ucode:_00001C000000000000010000030FD7E5"
                      "@type": "odpt:Operator"
                      "dc:date": "2017-01-13T15:10:00+09:00"
                      "owl:sameAs": "odpt.Operator:JR-East"
                      "dc:title": "JR東日本"
                      "odpt:operatorTitle":
                        ja: "JR東日本"
                        en: "JR East"
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "405":
          $ref: '#/components/responses/MethodNotAllowed'
        "500":
          $ref: '#/components/responses/InternalServerError'
        "503":
          $ref: '#/components/responses/ServiceUnavailable'

  "/odpt:Station":
    get:
      summary: 駅情報取得
      description: |
        駅情報を取得します。
      operationId: getStation
      tags:
        - Railway
      parameters:
        - name: acl:consumerKey
          in: query
          required: true
          description: developerサイトにて発行されたアクセストークン
          schema:
            type: string
        - name: "@id"
          in: query
          required: false
          description: データに付与された固有識別子（フィルタリング用）
          schema:
            type: string
            format: uri
            example: "urn:ucode:_00001C000000000000010000031028E6"
        - name: owl:sameAs
          in: query
          required: false
          description: データに付与された固有識別子の別名（フィルタリング用）
          schema:
            type: string
            format: uri
            example: "odpt.Station:JR-East.Yamanote.Tokyo"
        - name: dc:title
          in: query
          required: false
          description: 駅名（日本語）。コンマ区切りでOR検索
          schema:
            type: string
            example: "東京,五反田"
        - name: odpt:operator
          in: query
          required: false
          description: 事業者を表すID (odpt:Operatorのowl:sameAs)
          schema:
            type: string
            format: uri
            example: "odpt.Operator:JR-East"
        - name: odpt:railway
          in: query
          required: false
          description: 駅が存在する路線ID (odpt:Railwayのowl:sameAs)
          schema:
            type: string
            format: uri
            example: "odpt.Railway:JR-East.Yamanote"
        - name: odpt:stationCode
          in: query
          required: false
          description: 駅ナンバリング（e.g. OH01=小田急新宿駅）
          schema:
            type: string
            example: "OH01"
      responses:
        "200":
          description: 正常終了
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Station'
              examples:
                station:
                  summary: 駅情報の例
                  value:
                    - "@context": "http://vocab.odpt.org/context_odpt.jsonld"
                      "@id": "urn:ucode:_00001C000000000000010000031028E6"
                      "@type": "odpt:Station"
                      "dc:date": "2017-01-13T15:10:00+09:00"
                      "owl:sameAs": "odpt.Station:JR-East.Yamanote.Tokyo"
                      "dc:title": "東京"
                      "odpt:stationTitle":
                        ja: "東京"
                        en: "Tokyo"
                      "odpt:operator": "odpt.Operator:JR-East"
                      "odpt:railway": "odpt.Railway:JR-East.Yamanote"
                      "geo:long": 139.766926
                      "geo:lat": 35.681265
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "405":
          $ref: '#/components/responses/MethodNotAllowed'
        "500":
          $ref: '#/components/responses/InternalServerError'
        "503":
          $ref: '#/components/responses/ServiceUnavailable'

  "/odpt:Railway":
    get:
      summary: 路線情報取得
      description: |
        路線情報を取得します。
      operationId: getRailway
      tags:
        - Railway
      parameters:
        - name: acl:consumerKey
          in: query
          required: true
          description: developerサイトにて発行されたアクセストークン
          schema:
            type: string
        - name: "@id"
          in: query
          required: false
          description: データに付与された固有識別子（フィルタリング用）
          schema:
            type: string
            format: uri
        - name: owl:sameAs
          in: query
          required: false
          description: データに付与された固有識別子の別名（フィルタリング用）
          schema:
            type: string
            format: uri
            example: "odpt.Railway:JR-East.Yamanote"
        - name: dc:title
          in: query
          required: false
          description: 路線名（日本語）。e.g. 小田原線、京王線、相模原線
          schema:
            type: string
            example: "小田原線"
        - name: odpt:operator
          in: query
          required: false
          description: 事業者を表すID (odpt:Operatorのowl:sameAs)
          schema:
            type: string
            format: uri
            example: "odpt.Operator:JR-East"
        - name: odpt:lineCode
          in: query
          required: false
          description: 路線コード、路線シンボル表記（e.g. 小田原線 => OH、丸ノ内線 => M）
          schema:
            type: string
            example: "OH"
      responses:
        "200":
          description: 正常終了
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Railway'
              examples:
                railway:
                  summary: 路線情報の例
                  value:
                    - "@context": "http://vocab.odpt.org/context_odpt.jsonld"
                      "@id": "urn:ucode:_00001C000000000000010000030FD7E5"
                      "@type": "odpt:Railway"
                      "dc:date": "2017-01-13T15:10:00+09:00"
                      "owl:sameAs": "odpt.Railway:JR-East.ChuoRapid"
                      "dc:title": "中央線快速"
                      "odpt:railwayTitle":
                        ja: "中央線快速"
                        en: "Chuo Rapid Line"
                      "odpt:operator": "odpt.Operator:JR-East"
                      "odpt:ascendingRailDirection": "odpt.RailDirection:Outbound"
                      "odpt:descendingRailDirection": "odpt.RailDirection:Inbound"
                      "odpt:stationOrder":
                        - "odpt:index": 1
                          "odpt:station": "odpt.Station:JR-East.ChuoRapid.Tokyo"
                          "odpt:stationTitle":
                            ja: "東京"
                            en: "Tokyo"
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "405":
          $ref: '#/components/responses/MethodNotAllowed'
        "500":
          $ref: '#/components/responses/InternalServerError'
        "503":
          $ref: '#/components/responses/ServiceUnavailable'

  "/odpt:StationTimetable":
    get:
      summary: 駅時刻表取得
      description: |
        駅時刻表を取得します。
      operationId: getStationTimetable
      tags:
        - Railway
      parameters:
        - name: acl:consumerKey
          in: query
          required: true
          description: developerサイトにて発行されたアクセストークン
          schema:
            type: string
        - name: "@id"
          in: query
          required: false
          description: データに付与された固有識別子（フィルタリング用）
          schema:
            type: string
            format: uri
        - name: owl:sameAs
          in: query
          required: false
          description: データに付与された固有識別子の別名（フィルタリング用）
          schema:
            type: string
            format: uri
            example: "odpt.StationTimetable:JR-East.ChuoRapid.Tokyo.Outbound.Weekday"
        - name: odpt:station
          in: query
          required: false
          description: 駅を表すID（odpt:Stationのowl:sameAs）
          schema:
            type: string
            format: uri
            example: "odpt.Station:JR-East.ChuoRapid.Tokyo"
        - name: odpt:railway
          in: query
          required: false
          description: 路線を表すID（odpt:Railwayのowl:sameAs）
          schema:
            type: string
            format: uri
            example: "odpt.Railway:JR-East.ChuoRapid"
        - name: odpt:operator
          in: query
          required: false
          description: 事業者を表すID（odpt:Operatorのowl:sameAs）
          schema:
            type: string
            format: uri
            example: "odpt.Operator:JR-East"
        - name: odpt:railDirection
          in: query
          required: false
          description: 進行方向を表すID（odpt:RailDirectionのowl:sameAs）
          schema:
            type: string
            format: uri
            example: "odpt.RailDirection:Outbound"
        - name: odpt:calendar
          in: query
          required: false
          description: 実施日を表すID（odpt:Calendarのowl:sameAs）
          schema:
            type: string
            format: uri
            example: "odpt.Calendar:Weekday"
        - name: dc:date
          in: query
          required: false
          description: 特定日付の時刻表を取得
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: 正常終了
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StationTimetable'
              examples:
                stationTimetable:
                  summary: 駅時刻表の例
                  value:
                    - "@context": "http://vocab.odpt.org/context_odpt.jsonld"
                      "@id": "urn:ucode:_00001C000000000000010000030FD7E5"
                      "@type": "odpt:StationTimetable"
                      "dc:date": "2017-01-13T15:10:00+09:00"
                      "dct:issued": "2017-01-01"
                      "owl:sameAs": "odpt.StationTimetable:JR-East.ChuoRapid.Tokyo.Outbound.Weekday"
                      "odpt:operator": "odpt.Operator:JR-East"
                      "odpt:railway": "odpt.Railway:JR-East.ChuoRapid"
                      "odpt:station": "odpt.Station:JR-East.ChuoRapid.Tokyo"
                      "odpt:railDirection": "odpt.RailDirection:Outbound"
                      "odpt:calendar": "odpt.Calendar:Weekday"
                      "odpt:stationTimetableObject":
                        - "odpt:departureTime": "06:00"
                          "odpt:destinationStation": ["odpt.Station:JR-East.ChuoRapid.Takao"]
                          "odpt:trainType": "odpt.TrainType:JR-East.Rapid"
                        - "odpt:departureTime": "06:10"
                          "odpt:destinationStation": ["odpt.Station:JR-East.ChuoRapid.Takao"]
                          "odpt:trainType": "odpt.TrainType:JR-East.Rapid"
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "405":
          $ref: '#/components/responses/MethodNotAllowed'
        "500":
          $ref: '#/components/responses/InternalServerError'
        "503":
          $ref: '#/components/responses/ServiceUnavailable'

  "/odpt:RailDirection":
    get:
      summary: 進行方向情報取得
      description: |
        進行方向の定義を取得します。
      operationId: getRailDirection
      tags:
        - Railway
      parameters:
        - name: acl:consumerKey
          in: query
          required: true
          description: developerサイトにて発行されたアクセストークン
          schema:
            type: string
        - name: "@id"
          in: query
          required: false
          description: データに付与された固有識別子（フィルタリング用）
          schema:
            type: string
            format: uri
        - name: owl:sameAs
          in: query
          required: false
          description: データに付与された固有識別子の別名（フィルタリング用）。コンマ区切りで複数指定可能
          schema:
            type: string
            format: uri
            example: "odpt.RailDirection:Inbound,odpt.RailDirection:Outbound"
      responses:
        "200":
          description: 正常終了
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RailDirection'
              examples:
                railDirection:
                  summary: 進行方向情報の例
                  value:
                    - "@context": "http://vocab.odpt.org/context_odpt.jsonld"
                      "@id": "urn:ucode:_00001C000000000000010000030FD7E5"
                      "@type": "odpt:RailDirection"
                      "dc:date": "2017-01-13T06:10:00+0000"
                      "owl:sameAs": "odpt.RailDirection:Inbound"
                      "dc:title": "上り"
                      "odpt:railDirectionTitle":
                        ja: "上り"
                        en: "Inbound"
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "405":
          $ref: '#/components/responses/MethodNotAllowed'
        "500":
          $ref: '#/components/responses/InternalServerError'
        "503":
          $ref: '#/components/responses/ServiceUnavailable'

  "/odpt:TrainType":
    get:
      summary: 電車種別情報取得
      description: |
        列車種別の定義を取得します。
      operationId: getTrainType
      tags:
        - Railway
      parameters:
        - name: acl:consumerKey
          in: query
          required: true
          description: developerサイトにて発行されたアクセストークン
          schema:
            type: string
        - name: "@id"
          in: query
          required: false
          description: データに付与された固有識別子（フィルタリング用）
          schema:
            type: string
            format: uri
        - name: owl:sameAs
          in: query
          required: false
          description: データに付与された固有識別子の別名（フィルタリング用）
          schema:
            type: string
            format: uri
            example: "odpt.TrainType:JR-East.Local"
        - name: odpt:operator
          in: query
          required: false
          description: 事業者を表すID (odpt:Operatorのowl:sameAs)
          schema:
            type: string
            format: uri
            example: "odpt.Operator:JR-East"
      responses:
        "200":
          description: 正常終了
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TrainType'
              examples:
                trainType:
                  summary: 電車種別情報の例
                  value:
                    - "@context": "http://vocab.odpt.org/context_odpt.jsonld"
                      "@id": "urn:ucode:_00001C000000000000010000030FD7E5"
                      "@type": "odpt:TrainType"
                      "dc:date": "2017-01-13T15:10:00+09:00"
                      "owl:sameAs": "odpt.TrainType:JR-East.Local"
                      "odpt:operator": "odpt.Operator:JR-East"
                      "dc:title": "普通"
                      "odpt:trainTypeTitle":
                        ja: "普通"
                        en: "Local"
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "405":
          $ref: '#/components/responses/MethodNotAllowed'
        "500":
          $ref: '#/components/responses/InternalServerError'
        "503":
          $ref: '#/components/responses/ServiceUnavailable'

  "/odpt:TrainInformation":
    get:
      summary: 運行情報取得
      description: |
        列車運行情報を取得します。
      operationId: getTrainInformation
      tags:
        - Railway
      parameters:
        - name: acl:consumerKey
          in: query
          required: true
          description: developerサイトにて発行されたアクセストークン
          schema:
            type: string
        - name: owl:sameAs
          in: query
          required: false
          description: データに付与された固有識別子の別名（フィルタリング用）
          schema:
            type: string
            format: uri
            example: "odpt.TrainInformation:TokyoMetro.Ginza"
        - name: odpt:operator
          in: query
          required: false
          description: 運行情報を配信する事業者のID (odpt:Operatorのowl:sameAs)
          schema:
            type: string
            format: uri
            example: "odpt.Operator:TokyoMetro"
        - name: odpt:railway
          in: query
          required: false
          description: 運行情報が発生した路線のID (odpt:Railwayのowl:sameAs)
          schema:
            type: string
            format: uri
            example: "odpt.Railway:TokyoMetro.Ginza"
      responses:
        "200":
          description: 正常終了
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TrainInformation'
              examples:
                trainInformation:
                  summary: 運行情報の例
                  value:
                    - "@context": "http://vocab.odpt.org/context_odpt.jsonld"
                      "@id": "urn:ucode:_00001C000000000000010000030C3BE4"
                      "@type": "odpt:TrainInformation"
                      "dc:date": "2017-12-07T01:25:03+09:00"
                      "owl:sameAs": "odpt.TrainInformation:TokyoMetro.Ginza"
                      "dct:valid": "2017-12-07T01:30:03+09:00"
                      "odpt:timeOfOrigin": "2017-11-21T11:31:00+09:00"
                      "odpt:operator": "odpt.Operator:TokyoMetro"
                      "odpt:railway": "odpt.Railway:TokyoMetro.Ginza"
                      "odpt:trainInformationText":
                        ja: "現在、平常どおり運転しています。"
                        en: "Running on schedule."
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "405":
          $ref: '#/components/responses/MethodNotAllowed'
        "500":
          $ref: '#/components/responses/InternalServerError'
        "503":
          $ref: '#/components/responses/ServiceUnavailable'

  "/odpt:PassengerSurvey":
    get:
      summary: 乗降人員数調査情報取得
      description: |
        駅の乗降人員数を取得します。
      operationId: getPassengerSurvey
      tags:
        - Railway
      parameters:
        - name: acl:consumerKey
          in: query
          required: true
          description: developerサイトにて発行されたアクセストークン
          schema:
            type: string
        - name: "@id"
          in: query
          required: false
          description: データに付与された固有識別子（フィルタリング用）
          schema:
            type: string
            format: uri
        - name: owl:sameAs
          in: query
          required: false
          description: データに付与された固有識別子の別名（フィルタリング用）
          schema:
            type: string
