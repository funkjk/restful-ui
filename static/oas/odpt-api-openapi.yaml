          in: query
          required: true
          description: 取得する範囲の中心経度（10進数表記、測地系はWGS84）
          schema:
            type: number
            format: double
            example: 139.766926
        - name: radius
          in: query
          required: true
          description: 取得する範囲の半径（メートル、0-4000mの範囲）
