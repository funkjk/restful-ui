  /api/v2/projects:
    get:
      tags:
        - General
      summary: Get Project List
      description: "# Description\r\n\r\nReturns list of projects.\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/docs/backlog/api/2/get-project-list/"
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
        - name: archived
          in: query
          schema:
            type: string
          description: >-
            For unspecified parameters, this form returns all projects. For
            &lsquo;false&rsquo; parameters, it returns unarchived projects. For
            &rsquo;true&rsquo; parameters, it returns archived projects. :
            archived
          example: <Boolean>
        - name: all
          in: query
          schema:
            type: string
          description: >-
            Only applies to administrators. If &rsquo;true,&rsquo; it returns
            all projects. If &lsquo;false,&rsquo; it returns only projects they
            have joined (set to &lsquo;false&rsquo; by default). : all
          example: <Boolean>
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    post:
      tags:
        - General
      summary: Add Project
      description: "# Description\r\n\r\nAdds new project.\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/docs/backlog/api/2/add-project/"
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v2/projects/{projectIdOrKey}:
    get:
      tags:
        - General
      summary: Get Project
      description: "# Description\r\n\r\nReturns information about project.\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/docs/backlog/api/2/get-project/"
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
        - name: projectIdOrKey
          in: path
          schema:
            type: string
          required: true
