  /api/v2/resolutions:
    get:
      tags:
        - General
      summary: Get Resolution List
      description: "# Description\r\n\r\nReturns list of resolutions.\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/docs/backlog/api/2/get-resolution-list/"
      parameters:
        - name: apiKey
