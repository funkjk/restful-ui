      description: "# Description\r\n\r\nReturns list of priorities.\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/docs/backlog/api/2/get-priority-list/"
      parameters:
        - name: apiKey
          in: query
          schema:
