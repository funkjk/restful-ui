  /api/v2/users/{userId}/icon:
    get:
      tags:
        - General
      summary: Get User Icon
      description: "# Description\r\n\r\nDownloads user icon.\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/docs/backlog/api/2/get-user-icon/"
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
        - name: userId
          in: path
          schema:
            type: string
          required: true
      responses:
        '200':
