      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
        - name: order
          in: query
          schema:
            type: string
          description: 'Order of the sort “asc” or “desc” default=“desc” : order'
          example: <String>
        - name: sort
          in: query
          schema:
            type: string
          description: >-
            What to sort results by. The value “created”, “updated” or
            “issueUpdated” are allowed. default=“issueUpdated” : sort
          example: <String>
        - name: count
          in: query
          schema:
            type: string
          description: 'Number of records to retrieve(1-100) default=20 : count'
          example: <Number>
        - name: offset
          in: query
          schema:
            type: string
          description: >-
            Where to start returning records from the entire results. default=0
            : offset
          example: <Number>
        - name: resourceAlreadyRead
          in: query
          schema:
            type: string
          description: >-
            Whether the issues already read are retrieved or not. The all
            watching issues are returned if this parameter is omitted. The read
            watching issues are returned if true. The unread watching issues are
            returned if false. default=null : resourceAlreadyRead
          example: <Boolean>
        - name: issueId[]
          in: query
          schema:
            type: string
          description: 'Issue ID : issueId[]'
          example: <Number>
        - name: userId
          in: path
          schema:
            type: string
          required: true
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
