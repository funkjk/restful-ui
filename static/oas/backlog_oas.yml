          example: '{{ApiKey}}'
        - name: order
          in: query
          schema:
            type: string
          description: '“asc” or “desc” default=“desc” : order'
          example: <String>
        - name: offset
          in: query
          schema:
            type: string
          description: ' : offset'
          example: <Number>
        - name: count
          in: query
          schema:
            type: string
          description: 'number of records to retrieve(1-100) default=20 : count'
          example: <Number>
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v2/users/myself/recentlyViewedProjects:
    get:
      tags:
        - General
      summary: Get List of Recently Viewed Projects
      description: "# Description\r\n\r\nReturns list of projects which the user viewed recently.\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/docs/backlog/api/2/get-list-of-recently-viewed-projects/"
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
        - name: order
          in: query
          schema:
            type: string
          description: '“asc” or “desc” default=“desc” : order'
          example: <String>
        - name: offset
          in: query
          schema:
            type: string
          description: ' : offset'
          example: <Number>
        - name: count
          in: query
          schema:
            type: string
          description: 'number of records to retrieve(1-100) default=20 : count'
          example: <Number>
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v2/users/myself/recentlyViewedWikis:
    get:
      tags:
        - General
      summary: Get List of Recently Viewed Wikis
      description: "# Description\r\n\r\nReturns list of Wikis which the user viewed recently.\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/docs/backlog/api/2/get-list-of-recently-viewed-wikis/"
