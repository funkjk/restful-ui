openapi: 3.0.0
info:
  title: Backlog Postman Collection EN
  description: "## About Backlog\r\n\r\nBacklog is a popular cloud-based project management SaaS in Japan."
  version: 1.0.0
servers:
  - url: http://{{backlogurl}}
components:
  securitySchemes:
    apiKeyAuth:
      type: http
      scheme: apiKey
security:
  - apiKeyAuth: []
paths:
  /api/v2/space:
    get:
      tags:
        - General
      summary: Get Space
      description: "# Description\r\n\r\nReturns information about your space.\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/docs/backlog/api/2/get-space/"
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v2/space/activities:
    get:
      tags:
        - General
      summary: Get Recent Updates
      description: "# Description\r\n\r\nReturns recent updates in your space.\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/docs/backlog/api/2/get-recent-updates/"
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
        - name: activityTypeId[](複数指定可)
          in: query
          schema:
            type: string
          description: 'type(1-26) : activityTypeId[](複数指定可)'
          example: <Number>
        - name: minId
          in: query
          schema:
            type: string
          description: 'minimum ID : minId'
          example: <Number>
        - name: maxId
          in: query
          schema:
            type: string
          description: 'maximum ID : maxId'
          example: <Number>
        - name: count
          in: query
          schema:
            type: string
          description: 'number of records to retrieve(1-100) default=20 : count'
          example: <Number>
        - name: order
          in: query
          schema:
            type: string
          description: '“asc” or “desc” default=“desc” : order'
          example: <String>
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v2/space/image:
    get:
      tags:
        - General
      summary: Get Space Logo
      description: "# Description\r\n\r\nReturns logo image of your space.\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/docs/backlog/api/2/get-space-logo/"
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v2/space/notification:
    get:
      tags:
        - General
      summary: Get Space Notification
      description: "# Description\r\n\r\nReturns space notification.\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/docs/backlog/api/2/get-space-notification/"
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    put:
      tags:
        - General
      summary: Update Space Notification
      description: "# Description\r\n\r\nUpdates space notification.\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/docs/backlog/api/2/update-space-notification/"
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v2/space/diskUsage:
    get:
      tags:
        - General
      summary: Get Space Disk Usage
      description: "# Description\r\n\r\nReturns information about space disk usage.\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/docs/backlog/api/2/get-space-disk-usage/"
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v2/space/attachment:
    post:
      tags:
        - General
      summary: Post Attachment File
      description: "# Description\r\n\r\nPosts an attachment file for issue or wiki. Returns id of the attachment file.\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/docs/backlog/api/2/post-attachment-file/"
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  description: Attachment File
                  format: binary
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v2/users:
    get:
      tags:
        - General
      summary: Get User List
      description: "# Description\r\n\r\nReturns list of users in your space.\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/docs/backlog/api/2/get-user-list/"
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    post:
      tags:
        - General
      summary: Add User
      description: "# Description\r\n\r\nAdds new user to the space.\n&ldquo;Project Administrator&rdquo; cannot add &ldquo;Admin&rdquo; user.\nYou can&rsquo;t use this API at new plan space.\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/docs/backlog/api/2/add-user/"
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v2/users/{userId}:
    get:
      tags:
        - General
      summary: Get User
      description: "# Description\r\n\r\nReturns information about user.\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/docs/backlog/api/2/get-user/"
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
        - name: userId
          in: path
          schema:
            type: string
          required: true
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    patch:
      tags:
        - General
      summary: Update User
      description: "# Description\r\n\r\nUpdates information about user.\nYou can&rsquo;t use this API at new plan space.\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/docs/backlog/api/2/update-user/"
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
        - name: userId
          in: path
          schema:
            type: string
          required: true
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    delete:
      tags:
        - General
      summary: Delete User
      description: "# Description\r\n\r\nDeletes user from the space.\nYou can&rsquo;t use this API at new plan space.\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/docs/backlog/api/2/delete-user/"
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
        - name: userId
          in: path
          schema:
            type: string
          required: true
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v2/users/myself:
    get:
      tags:
        - General
      summary: Get Own User
      description: "# Description\r\n\r\nReturns own information about user.\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/docs/backlog/api/2/get-own-user/"
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
      responses:
