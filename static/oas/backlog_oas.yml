      description: "# Description\r\n\r\n\n       warning\n           Deprecated API\n          This API has been deprecated and is no longer recommended for use. Please replace it with Delete Team.\n\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/docs/backlog/api/2/delete-group/"
      parameters:
