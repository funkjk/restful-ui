      description: "# Description\r\n\r\nAdds new Status to the project.\nYou can create up to 8 custom statuses within a Project aside from the 4 default.\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/docs/backlog/api/2/add-status/"
      parameters:
        - name: apiKey
          in: query
