          description: 'number of records to retrieve(1-100) default=20 : count'
          example: <Number>
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v2/groups:
    get:
      tags:
        - General
      summary: Get List of Groups
      description: "# Description\r\n\r\n\n       warning\n           Deprecated API\n          This API has been deprecated and is no longer recommended for use. Please replace it with Get List of Teams.\n\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/docs/backlog/api/2/get-list-of-groups/"
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
        - name: order
          in: query
          schema:
            type: string
          description: '“asc” or “desc” default=“desc” : order'
          example: <String>
        - name: offset
          in: query
          schema:
            type: string
          description: ' : offset'
          example: <Number>
        - name: count
          in: query
          schema:
            type: string
          description: 'number of records to retrieve(1-100) default=20 : count'
          example: <Number>
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
    post:
      tags:
        - General
      summary: Add Group
      description: "# Description\r\n\r\n\n       warning\n           Deprecated API\n          This API has been deprecated and is no longer recommended for use. Please replace it with Add Team.\n\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/docs/backlog/api/2/add-group/"
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
