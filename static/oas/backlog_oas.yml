          content:
            application/json: {}
  /api/v2/users/{userId}/activities:
    get:
      tags:
        - General
      summary: Get User Recent Updates
      description: "# Description\r\n\r\nReturns user&rsquo;s recent updates\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/docs/backlog/api/2/get-user-recent-updates/"
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
        - name: activityTypeId[](Multiple)
          in: query
          schema:
            type: string
          description: 'type(1-17) : activityTypeId[](Multiple)'
          example: <Number>
        - name: minId
          in: query
          schema:
            type: string
          description: 'minimum ID : minId'
          example: <Number>
        - name: maxId
          in: query
          schema:
            type: string
          description: 'maximum ID : maxId'
          example: <Number>
        - name: count
          in: query
          schema:
            type: string
          description: 'number of records to retrieve(1-100) default=20 : count'
          example: <Number>
        - name: order
          in: query
          schema:
            type: string
          description: '“asc” or “desc” default=“desc” : order'
          example: <String>
        - name: userId
          in: path
          schema:
            type: string
          required: true
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v2/users/{userId}/stars:
    get:
      tags:
        - General
      summary: Get Received Star List
      description: "# Description\r\n\r\nReturns the list of stars that user received.\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/docs/backlog/api/2/get-received-star-list/"
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
        - name: minId
          in: query
          schema:
            type: string
          description: 'minimum ID : minId'
          example: <Number>
        - name: maxId
          in: query
          schema:
            type: string
          description: 'maximum ID : maxId'
          example: <Number>
        - name: count
          in: query
          schema:
            type: string
          description: 'number of records to retrieve(1-100) default=20 : count'
          example: <Number>
        - name: order
          in: query
          schema:
            type: string
          description: '“asc” or “desc” default=“desc” : order'
          example: <String>
        - name: userId
          in: path
          schema:
            type: string
          required: true
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v2/users/{userId}/stars/count:
    get:
      tags:
        - General
      summary: Count User Received Stars
      description: "# Description\r\n\r\nReturns number of stars that user received.\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/docs/backlog/api/2/count-user-received-stars/"
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
        - name: since
          in: query
          schema:
            type: string
          description: 'after the given date (yyyy-MM-dd) : since'
          example: <String>
        - name: until
          in: query
          schema:
            type: string
          description: 'before the given date (yyyy-MM-dd) : until'
          example: <String>
        - name: userId
          in: path
          schema:
            type: string
          required: true
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
  /api/v2/users/myself/recentlyViewedIssues:
    get:
      tags:
        - General
      summary: Get List of Recently Viewed Issues
      description: "# Description\r\n\r\nReturns list of issues which the user viewed recently.\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/docs/backlog/api/2/get-list-of-recently-viewed-issues/"
      parameters:
