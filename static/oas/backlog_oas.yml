    get:
      tags:
        - General
      summary: Count Watching
      description: "# Description\r\n\r\nReturns the number of your watching issues.\r\n\r\n# Reference Url\r\n\r\nhttps://developer.nulab.com/docs/backlog/api/2/count-watching/"
      parameters:
        - name: apiKey
          in: query
          schema:
            type: string
          example: '{{ApiKey}}'
        - name: resourceAlreadyRead
          in: query
          schema:
            type: string
          description: >-
            This parameter is optional. Set to false for unread watching count
            and true for already read watching count. : resourceAlreadyRead
          example: <Boolean>
        - name: alreadyRead
          in: query
          schema:
            type: string
          description: >-
            This parameter is optional. Set this parameter to false to get
            unread watching count since the last time checked by user and true
            for already read watching count. When both alreadyRead and
            resourceAlreadyRead parameters set, resourceAlreadyRead will be
            ignored. : alreadyRead
          example: <Boolean>
        - name: userId
          in: path
          schema:
            type: string
          required: true
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
