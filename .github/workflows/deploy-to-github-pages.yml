name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    env:
      BUILD_MODE: static
      BUILD_BASE_PATH: /restful-ui
      PUBLIC_CORS_PROXY_URL: https://restful-ui.vercel.app/api/proxy
      STORE_TYPE: inmemory
      KV_REST_API_URL: https://build.invalid
      KV_REST_API_TOKEN: build-dummy
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Generate SvelteKit types
        run: pnpm exec svelte-kit sync

      - name: Build static site (static build mode)
        run: pnpm run build:gh-pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Deployment URL
        run: echo "Pages URL ${{ steps.deployment.outputs.page_url }}"
